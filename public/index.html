<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f3864">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/src/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <title>TeamStats</title>
</head>
<body>
  <header id="topbar">
    <div class="topbar-inner">
      <img id="topbar-logo-left" class="topbar-logo" alt="" hidden>
      <span class="brand">TeamStats</span>
      <img id="topbar-logo-right" class="topbar-logo" alt="" hidden>
    </div>
    <div class="gold-stripe"></div>
  </header>

  <main id="app">
    <div class="skeleton">
      <div class="skel-bar"></div>
      <div class="skel-bar narrow"></div>
    </div>
  </main>

  <nav id="bottomnav" hidden>
    <a href="#/" data-tab="team"><span>🏟️</span><label>Team</label></a>
    <a href="#/" data-tab="schedule"><span>📅</span><label>Schedule</label></a>
    <a href="#/" data-tab="players"><span>👥</span><label>Players</label></a>
    <a href="#/" data-tab="log"><span>📋</span><label>Log</label></a>
    <a href="#/" data-tab="lineup"><span>📝</span><label>Lineup</label></a>
    <a href="#/" data-tab="entry" hidden><span>➕</span><label>Add</label></a>
  </nav>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
